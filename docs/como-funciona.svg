<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 940" width="1000" height="940" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- fondo -->
  <rect x="0" y="0" width="1000" height="940" fill="#EEF2F7"/>
  <rect x="12" y="12" width="976" height="916" rx="26" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ===== HEADER ===== -->
  <text x="500" y="86" text-anchor="middle" font-size="47" font-weight="700" fill="#0F172A">El Arnés</text>
  <text x="500" y="122" text-anchor="middle" font-size="21" fill="#475569">Un sistema de orden para trabajar con IA</text>
  <text x="500" y="160" text-anchor="middle" font-size="16" fill="#64748B" font-style="italic">Tu conocimiento vive en archivos ordenados, no en la IA — y tú siempre mandas.</text>
  <line x1="70" y1="188" x2="930" y2="188" stroke="#E9EEF4" stroke-width="1.5"/>

  <!-- ===== TRANSFORMACIÓN: antes -> arnés -> después ===== -->
  <text x="175" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#94A3B8" letter-spacing="1.5">ANTES</text>
  <text x="825" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#94A3B8" letter-spacing="1.5">DESPUÉS</text>

  <!-- antes: puntos grises dispersos -->
  <g fill="#CBD5E1">
    <circle cx="150" cy="300" r="8"/><circle cx="198" cy="298" r="7"/><circle cx="160" cy="335" r="9"/>
    <circle cx="205" cy="342" r="6"/><circle cx="176" cy="318" r="6"/><circle cx="138" cy="332" r="7"/>
    <circle cx="216" cy="318" r="6"/>
  </g>

  <!-- después: grafo de colores conectado -->
  <g stroke="#CBD5E1" stroke-width="1.5">
    <line x1="825" y1="298" x2="795" y2="330"/><line x1="825" y1="298" x2="858" y2="325"/>
    <line x1="795" y1="330" x2="812" y2="356"/><line x1="858" y1="325" x2="848" y2="356"/>
    <line x1="812" y1="356" x2="848" y2="356"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="2">
    <circle cx="825" cy="298" r="9" fill="#3B82F6"/><circle cx="795" cy="330" r="9" fill="#F97316"/>
    <circle cx="858" cy="325" r="9" fill="#16A34A"/><circle cx="812" cy="356" r="9" fill="#9333EA"/>
    <circle cx="848" cy="356" r="9" fill="#F59E0B"/>
  </g>

  <!-- badge central -->
  <rect x="405" y="286" width="190" height="80" rx="16" fill="#4F46E5"/>
  <text x="500" y="322" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">EL ARNÉS</text>
  <text x="500" y="347" text-anchor="middle" font-size="12.5" fill="#C7D2FE">ordena + protege</text>

  <!-- flechas -->
  <g stroke="#94A3B8" stroke-width="3" fill="#94A3B8">
    <line x1="300" y1="326" x2="360" y2="326"/><polygon points="372,326 358,319 358,333"/>
    <line x1="640" y1="326" x2="700" y2="326"/><polygon points="712,326 698,319 698,333"/>
  </g>

  <text x="175" y="392" text-anchor="middle" font-size="13.5" fill="#64748B">Todo disperso,</text>
  <text x="175" y="411" text-anchor="middle" font-size="13.5" fill="#64748B">se pierde en la IA</text>
  <text x="825" y="392" text-anchor="middle" font-size="13.5" fill="#64748B">Tu segundo cerebro,</text>
  <text x="825" y="411" text-anchor="middle" font-size="13.5" fill="#64748B">en orden</text>

  <line x1="70" y1="446" x2="930" y2="446" stroke="#E9EEF4" stroke-width="1.5"/>

  <!-- ===== 4 PILARES ===== -->
  <!-- card 1 -->
  <rect x="60" y="470" width="205" height="152" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  <g stroke="#93C5FD" stroke-width="2"><line x1="150" y1="512" x2="175" y2="508"/><line x1="150" y1="512" x2="162" y2="530"/></g>
  <g fill="#3B82F6"><circle cx="150" cy="512" r="6"/><circle cx="175" cy="508" r="6"/><circle cx="162" cy="530" r="6"/></g>
  <text x="162.5" y="562" text-anchor="middle" font-size="16.5" font-weight="700" fill="#0F172A">Segundo cerebro</text>
  <text x="162.5" y="588" text-anchor="middle" font-size="13" fill="#64748B">Un espacio por proyecto:</text>
  <text x="162.5" y="607" text-anchor="middle" font-size="13" fill="#64748B">notas, bitácora y protocolo.</text>

  <!-- card 2 -->
  <rect x="285" y="470" width="205" height="152" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  <path d="M379.5,514 v-5 a8,8 0 0 1 16,0 v5" fill="none" stroke="#F97316" stroke-width="3"/>
  <rect x="373.5" y="514" width="28" height="20" rx="4" fill="#F97316"/>
  <text x="387.5" y="562" text-anchor="middle" font-size="16.5" font-weight="700" fill="#0F172A">Candado de foco</text>
  <text x="387.5" y="588" text-anchor="middle" font-size="13" fill="#64748B">Una sesión, un proyecto.</text>
  <text x="387.5" y="607" text-anchor="middle" font-size="13" fill="#64748B">Nada se mezcla.</text>

  <!-- card 3 -->
  <rect x="510" y="470" width="205" height="152" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  <path d="M612.5,504 L627,510 V524 C627,534 620,540 612.5,543 C605,540 598,534 598,524 V510 Z" fill="#16A34A"/>
  <path d="M606,523 l4,4 l8,-9" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="612.5" y="562" text-anchor="middle" font-size="16.5" font-weight="700" fill="#0F172A">Policía de orden</text>
  <text x="612.5" y="588" text-anchor="middle" font-size="13" fill="#64748B">Te avisa si algo</text>
  <text x="612.5" y="607" text-anchor="middle" font-size="13" fill="#64748B">se desordena.</text>

  <!-- card 4 -->
  <rect x="735" y="470" width="205" height="152" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  <g stroke="#E9D5FF" stroke-width="2"><line x1="825" y1="512" x2="850" y2="509"/><line x1="825" y1="512" x2="833" y2="530"/><line x1="850" y1="509" x2="848" y2="528"/></g>
  <circle cx="825" cy="512" r="5.5" fill="#3B82F6"/><circle cx="850" cy="509" r="5.5" fill="#F97316"/>
  <circle cx="833" cy="530" r="5.5" fill="#16A34A"/><circle cx="848" cy="528" r="5.5" fill="#9333EA"/>
  <text x="837.5" y="562" text-anchor="middle" font-size="16.5" font-weight="700" fill="#0F172A">Grafo de colores</text>
  <text x="837.5" y="588" text-anchor="middle" font-size="13" fill="#64748B">Ves tu conocimiento</text>
  <text x="837.5" y="607" text-anchor="middle" font-size="13" fill="#64748B">conectado (gratis).</text>

  <!-- ===== 3 PASOS ===== -->
  <text x="500" y="682" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Empezar toma minutos — sin programar</text>

  <circle cx="180" cy="732" r="22" fill="#3B82F6"/><text x="180" y="740" text-anchor="middle" font-size="21" font-weight="700" fill="#FFFFFF">1</text>
  <circle cx="500" cy="732" r="22" fill="#F97316"/><text x="500" y="740" text-anchor="middle" font-size="21" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="820" cy="732" r="22" fill="#16A34A"/><text x="820" y="740" text-anchor="middle" font-size="21" font-weight="700" fill="#FFFFFF">3</text>

  <text x="180" y="782" text-anchor="middle" font-size="13.5" fill="#334155">Abre la carpeta</text>
  <text x="180" y="800" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F172A">en Claude Code.</text>
  <text x="500" y="782" text-anchor="middle" font-size="13.5" fill="#334155">Dile:</text>
  <text x="500" y="800" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F172A">«arma mi arnés».</text>
  <text x="820" y="782" text-anchor="middle" font-size="13.5" fill="#334155">Responde 3 cositas: nombre,</text>
  <text x="820" y="800" text-anchor="middle" font-size="13.5" fill="#334155">proyectos y tu clave.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="60" y="838" width="880" height="62" rx="14" fill="#F8FAFC" stroke="#E7EBF1" stroke-width="1.5"/>
  <text x="500" y="868" text-anchor="middle" font-size="15" font-weight="600" fill="#16A34A">✓ Sin programar     ✓ Gratis     ✓ Tus datos son tuyos</text>
  <text x="500" y="890" text-anchor="middle" font-size="14" font-weight="600" fill="#4F46E5">github.com/csolucionesup-hub/arnes</text>
</svg>
